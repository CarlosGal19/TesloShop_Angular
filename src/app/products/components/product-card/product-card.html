<div class="card bg-base-100 shadow-sm animate-fade-in">
  <figure>
    <img
      [src]="baseUrl()"
      alt="Shoes" />
  </figure>
  <div class="card-body">
    <h2 class="card-title">{{title()}}</h2>
    <p>{{description() | slice:0:70}}...</p>
    <div class="card-actions justify-end">
      <a [routerLink]="['product', productId()]" class="link link-accent">Buy Now</a>
    </div>
  </div>
</div>
