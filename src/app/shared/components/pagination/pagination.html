<div class="join flex justify-center items-center mt-4 mb-10">

  @for (page of pagesCounter(); track $index) {
    <button
      class="join-item btn"
      [class.btn-primary]="page === internalPage()"
      [routerLink]="[]"
      [queryParams]="{page: page}"
      (click)="internalPage.set(page)"
      >{{page}}</button>
  } @empty {
    <p>No pages</p>
  }

</div>
