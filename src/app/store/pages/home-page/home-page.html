<h1 class="text-3xl font-bold font-montserrat">All products</h1>
<h2 class="text-xl mb-5">For everyone</h2>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 mt-2 gap-3">
  @if (!productsResource.isLoading()) {
    @for (product of productsResource.value()?.products; track $index) {
      <product-card [productId]="product.id" [description]="product.description" [imageUrl]="product.images[0]" [title]="product.title" />
    }
  }
</div>
