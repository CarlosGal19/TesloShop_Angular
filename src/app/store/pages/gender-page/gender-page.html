<h1 class="text-3xl font-bold font-montserrat">
  All the products
  <span class="text-accent">{{ gender() }}</span>
</h1>
<h2 class="text-xl mb-5">Something for everyone</h2>

<div
  class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 mt-2 gap-3"
>
  @for (product of genderProductsResource.value()!.products; track $index) {
    <product-card [productId]="product.id" [description]="product.description" [imageUrl]="product.images[0]" [title]="product.title" />

  }
  <!-- Empty -->
  @empty {
  <p>No hay productos</p>
  }
</div>

<pagination [pagesAmount]="genderProductsResource.value()?.pages ?? 0" [currentPage]="paginationService.currentPage()"></pagination>
